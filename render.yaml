services:
  - type: web
    name: library-management-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: library-management-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://library-management-frontend.onrender.com

  - type: web
    name: library-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://library-management-backend.onrender.com

databases:
  - name: library-management-db
